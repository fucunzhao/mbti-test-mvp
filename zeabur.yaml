# Zeabur 部署配置
# 参考：https://zeabur.com/docs
service:
  name: mbti-test-mvp
  type: web
  runtime: python3
  build_command: pip install -r requirements.txt
  start_command: uvicorn server:app --host 0.0.0.0 --port $PORT
  health_check:
    path: /health
    interval: 30s
    timeout: 5s

env:
  - name: SUPABASE_URL
    required: true
  - name: SUPABASE_KEY
    required: true
  - name: WX_APPID
    required: false
  - name: WX_MCHID
    required: false
  - name: WX_KEY
    required: false
