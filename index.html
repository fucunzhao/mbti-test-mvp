<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>MBTI 16型人格情景测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#667eea;--primary-dark:#5a6fd6;--accent:#764ba2;--bg:#f0f2f5;--card:#fff;--text:#1a1a2e;--muted:#888;--radius:16px;--shadow:0 2px 20px rgba(0,0,0,0.06)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ===== 布局 ===== */
.app{max-width:720px;margin:0 auto;padding:16px 16px 32px}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px 24px;margin-bottom:16px}
.card-header{text-align:center;margin-bottom:8px}
.card-header h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card-header p{color:var(--muted);font-size:13px;margin-top:4px}

/* ===== 步骤指示 ===== */
.steps{display:flex;justify-content:center;gap:8px;margin-bottom:24px}
.step{width:32px;height:4px;border-radius:2px;background:#e0e0e0;transition:all .3s}
.step.active{background:linear-gradient(90deg,var(--primary),var(--accent));width:48px}
.step.done{background:var(--primary)}

/* ===== 模式选择 ===== */
.mode-grid{display:grid;gap:16px;grid-template-columns:1fr 1fr;margin:20px 0}
.mode-card{border:2px solid #e8e8e8;border-radius:var(--radius);padding:24px 20px;cursor:pointer;transition:all .2s;text-align:center}
.mode-card:hover{border-color:var(--primary);transform:translateY(-2px)}
.mode-card .icon{font-size:36px;margin-bottom:8px}
.mode-card h3{font-size:16px;margin-bottom:4px}
.mode-card p{font-size:13px;color:var(--muted);line-height:1.6}
.mode-card .time{border-radius:20px;font-size:12px;padding:3px 10px;display:inline-block;margin-top:8px}
.mode-card .time.quick{background:#eef0ff;color:var(--primary)}
.mode-card .time.full{background:#f3eef9;color:var(--accent)}

/* ===== 欢迎区 ===== */
.hero{text-align:center;padding:16px 0}
.hero .emoji{font-size:56px;margin-bottom:12px}
.hero h2{font-size:20px;margin-bottom:8px}
.hero p{color:#666;font-size:14px;line-height:1.8;max-width:440px;margin:0 auto}

/* ===== 答题区 ===== */
.dim-tag{display:inline-block;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:14px}
.dim-ei{background:#e8f4f8;color:#1a7a9e}
.dim-sn{background:#f0e8f8;color:#6a3a9e}
.dim-tf{background:#fef3e2;color:#b06a1a}
.dim-jp{background:#e8f8ec;color:#1a8a3a}

.story-box{background:#f8f9ff;border-radius:14px;padding:20px;margin-bottom:20px;border-left:4px solid var(--primary);line-height:1.8;font-size:15px;color:#333}
.story-box .label{font-size:11px;color:var(--primary);font-weight:600;letter-spacing:1px;margin-bottom:6px}

.options{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:14px 16px;border:2px solid #e8e8e8;border-radius:12px;background:#fff;cursor:pointer;transition:all .2s;font-size:14px;line-height:1.6;color:#333;text-align:left;font-family:inherit;width:100%}
.opt:hover{border-color:var(--primary);background:#f8f9ff;transform:translateY(-1px)}
.opt .key{flex-shrink:0;width:26px;height:26px;border-radius:50%;background:#f0f2f5;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#666;transition:all .2s}
.opt.selected{border-color:var(--primary);background:#eef0ff}
.opt.selected .key{background:var(--primary);color:#fff}
.opt .text{flex:1}

.nav-row{display:flex;gap:10px;justify-content:space-between}
.btn{padding:11px 24px;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;white-space:nowrap}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important}
.btn-prev{background:#f0f2f5;color:#666;visibility:hidden}
.btn-prev:hover{background:#e0e0e0}
.btn-next{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;flex:1;max-width:180px;margin-left:auto}
.btn-next:hover:not(:disabled){opacity:.92;transform:translateY(-1px)}

/* ===== 结果页 ===== */
#resultPage .card{text-align:center}
.result-badge{display:inline-flex;align-items:center;justify-content:center;width:110px;height:110px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;font-size:32px;font-weight:800;letter-spacing:4px;margin:12px auto;box-shadow:0 6px 28px rgba(102,126,234,.3)}
.result-type{font-size:26px;font-weight:700;margin-bottom:2px}
.result-name{font-size:16px;color:var(--primary);font-weight:600;margin-bottom:16px}

.dim-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0 18px;text-align:left}
.dim-box{background:#f8f9ff;border-radius:12px;padding:12px 14px}
.dim-box .dl{font-size:11px;color:var(--muted);margin-bottom:3px}
.dim-box .dv{font-size:15px;font-weight:700}
.dim-box .dd{font-size:11px;color:#666;margin-top:1px}

.desc-box{text-align:left;background:#f8f9ff;border-radius:14px;padding:18px 20px;line-height:1.8;font-size:14px;color:#444;margin-bottom:14px}

/* ===== 历史记录 ===== */
.history-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 24px;margin-bottom:16px}
.history-card h3{font-size:15px;margin-bottom:12px;color:#444}
.record-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0}
.record-item:last-child{border:none}
.record-item .rtype{font-weight:700;font-size:15px;color:var(--primary)}
.record-item .rname{font-size:13px;color:#666;margin-left:6px}
.record-item .rtime{font-size:12px;color:var(--muted)}

/* ===== 按钮通用 ===== */
.btn-start,.btn-restart{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;padding:14px 40px;border:none;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:12px;transition:all .2s}
.btn-start:hover,.btn-restart:hover{transform:translateY(-2px);opacity:.95}
.btn-secondary{background:var(--bg);color:#444;padding:12px 28px;border:none;border-radius:12px;font-size:14px;cursor:pointer;font-family:inherit;margin-left:8px}

.hide{display:none!important}
.page{display:none}
.page.active{display:block}
@media(max-width:500px){
  .app{padding:10px 10px 24px}
  .card{padding:20px 16px}
  .mode-grid{grid-template-columns:1fr}
  .opt{font-size:13px;padding:12px 14px}
  .result-badge{width:90px;height:90px;font-size:28px}
  .dim-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">

  <!-- 卡片头部 -->
  <div class="card" style="padding:16px 24px">
    <div class="card-header" style="margin:0">
      <h1>🧠 16型人格情景测试</h1>
      <p>读个小故事，选出你的本能反应</p>
    </div>
  </div>

  <!-- ===== 欢迎页 ===== -->
  <div class="page active" id="welcomePage">
    <div class="card">
      <div class="hero">
        <div class="emoji">🔮</div>
        <h2>你了解自己的性格吗？</h2>
        <p>24个生活小故事，每个故事两种结局。<br>选那个<strong>你真正会做的</strong>，不是你觉得"应该"做的。</p>
      </div>
      <div class="mode-grid">
        <div class="mode-card" onclick="startTest('quick')">
          <div class="icon">⚡</div>
          <h3>快速版</h3>
          <p>24道题，每题都是一个小故事，约5分钟</p>
          <span class="time quick">~5分钟</span>
        </div>
        <div class="mode-card" onclick="startTest('full')">
          <div class="icon">📖</div>
          <h3>完整版</h3>
          <p>93道题，覆盖八大维度功能，约15分钟</p>
          <span class="time full">~15分钟</span>
        </div>
      </div>
    </div>
    <div class="history-card" id="historyCard">
      <h3>📋 历史记录</h3>
      <div id="historyList"><p style="color:#aaa;font-size:13px;text-align:center;padding:12px 0">暂无测试记录</p></div>
    </div>
  </div>

  <!-- ===== 答题页 ===== -->
  <div class="page" id="questionPage">
    <div class="card">
      <div class="steps" id="stepsBar"></div>
      <div id="dimTag" class="dim-tag"></div>
      <div class="story-box" id="storyBox">
        <div class="label">📖 场景</div>
        <div id="storyText"></div>
      </div>
      <div class="options" id="optContainer"></div>
      <div class="nav-row">
        <button class="btn btn-prev" id="prevBtn" onclick="prevQ()">← 上一题</button>
        <button class="btn btn-next" id="nextBtn" onclick="nextQ()">下一题 →</button>
      </div>
    </div>
    <div class="card" style="padding:12px 24px;text-align:center;font-size:12px;color:#aaa">
      已答 <span id="answeredCount">0</span>/<span id="totalCount">24</span> 题
    </div>
  </div>

  <!-- ===== 结果页 ===== -->
  <div class="page" id="resultPage">
    <div class="card">
      <div class="result-badge" id="resultBadge">ENFP</div>
      <div class="result-type" id="resultType">ENFP</div>
      <div class="result-name" id="resultName">竞选者</div>
      <div class="dim-grid" id="dimGrid"></div>
      <div class="desc-box" id="resultDesc"></div>
      <button class="btn-restart" onclick="goHome()">🔄 重新测试</button>
      <button class="btn-secondary" onclick="shareResult()">📤 分享结果</button>
    </div>
  </div>

</div>

<script>
// ===== 题库（完整93题，情景化） =====
const ALL_QUESTIONS = [
  // ===== E/I 维度（1-21题）=====
  ...[
    {q:'同事生日聚餐。下班后你走进包厢——',a:'自然地坐到中间，主动张罗点菜倒酒',b:'选个靠边的位置，和旁边一两个人聊'},
    {q:'周五下午六点，最难的项目终于交付了——',a:'约朋友出来喝一杯，聊聊这周的事',b:'终于可以一个人待着了，回家追剧'},
    {q:'搬到新城市第一个周末——',a:'主动参加线下聚会认识新朋友',b:'自己出去逛逛，一个人探店也舒服'},

// 24题精简版索引（每个维度的前6题）
const QUICK_INDICES = [0,1,2,3,4,5, 22,23,24,25,26,27, 48,49,50,51,52,53, 72,73,74,75,76,77];

const TYPE_NAMES = {

  'ISTJ':'物流师','ISFJ':'守卫者','ESTJ':'总经理','ESFJ':'执政官',
  'ISTP':'鉴赏家','ISFP':'探险家','ESTP':'企业家','ESFP':'表演者'

// ===== 状态 =====
let mode = 'quick';
let questions = [];
let current = 0;
let answers = [];

// ===== 渲染 =====
function render() {
  const dimColors = {'E/I':'dim-ei','S/N':'dim-sn','T/F':'dim-tf','J/P':'dim-jp'};
  const q = questions[current];
  document.getElementById('dimTag').className = 'dim-tag ' + (dimColors[q.dim]||'');
  document.getElementById('dimTag').textContent = '维度 ' + q.dim + (q.dim=='E/I'?' 充电方式':q.dim=='S/N'?' 感知世界':q.dim=='T/F'?' 决策方式':' 生活态度');
  document.getElementById('storyText').innerHTML = q.q;
  document.getElementById('optContainer').innerHTML = `
    <button class="opt ${answers[current]==='a'?'selected':''}" onclick="sel('a')">
      <span class="key">A</span><span class="text">${q.a}</span>
    </button>
    <button class="opt ${answers[current]==='b'?'selected':''}" onclick="sel('b')">
      <span class="key">B</span><span class="text">${q.b}</span>
    </button>`;
  const done = answers.filter(x=>x!==null).length;
  document.getElementById('answeredCount').textContent = done;
  document.getElementById('totalCount').textContent = questions.length;
  document.getElementById('prevBtn').style.visibility = current===0?'hidden':'visible';
  const nb = document.getElementById('nextBtn');
  nb.textContent = current===questions.length-1?'🎯 查看结果':'下一题 →';
  nb.disabled = answers[current]===null;
  // 步骤条
  document.getElementById('stepsBar').innerHTML = questions.map((_,i)=>
    `<div class="step ${i<current?'done':''} ${i===current?'active':''}"></div>`
  ).join('');
}

function sel(v) {
  answers[current]=v;
  document.querySelectorAll('.opt').forEach((b,i)=>b.classList.toggle('selected',(i===0&&v==='a')||(i===1&&v==='b')));
  document.getElementById('nextBtn').disabled=false;
}

function nextQ() {
  if(current<questions.length-1){current++;render()}
  else if(answers.includes(null)){alert('还有题目没答完')}
  else showResult();
}
function prevQ(){if(current>0){current--;render()}}

// ===== 计算结果 =====
function calcResult() {
  const dims = [
    {key:'E',idxes:findIdx('E/I'),thres:Math.ceil(findIdx('E/I').length/2)},
    {key:'S',idxes:findIdx('S/N'),thres:Math.ceil(findIdx('S/N').length/2)},
    {key:'T',idxes:findIdx('T/F'),thres:Math.ceil(findIdx('T/F').length/2)},
    {key:'J',idxes:findIdx('J/P'),thres:Math.ceil(findIdx('J/P').length/2)},
  ];
  function findIdx(d){
    return questions.map((q,i)=>q.dim===d?i:-1).filter(i=>i>=0);
  }
  const results = dims.map(d=>{
    const aCount = d.idxes.filter(i=>answers[i]==='a').length;
    const isA = aCount >= d.thres;
    return {
      dim: d.key==='E'?'E/I':d.key==='S'?'S/N':d.key==='T'?'T/F':'J/P',
      letter: isA ? d.key : (d.key==='E'?'I':d.key==='S'?'N':d.key==='T'?'F':'P'),
      score: isA ? aCount : d.idxes.length - aCount,
      total: d.idxes.length,
      left: d.key==='E'?'外向·E':d.key==='S'?'实感·S':d.key==='T'?'思考·T':'计划·J',
      right: d.key==='E'?'内向·I':d.key==='S'?'直觉·N':d.key==='T'?'情感·F':'随性·P'
    };
  });
  const type = results.map(r=>r.letter).join('');
  return {type, results};
}

function showResult() {
  const {type, results} = calcResult();
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('resultPage').classList.add('active');
  document.getElementById('resultBadge').textContent = type;
  document.getElementById('resultType').textContent = type;
  document.getElementById('resultName').textContent = '「'+(TYPE_NAMES[type]||'——')+'」';
  document.getElementById('resultDesc').innerHTML = TYPE_DESCS[type]||'探索你的性格类型。';
  document.getElementById('dimGrid').innerHTML = results.map(r=>{
    const active = r.letter === r.left.charAt(r.left.length-1) ? 'left' : 'right';
    return `<div class="dim-box" style="background:${active==='left'?'#eef0ff':'#f8f9ff'}">
      <div class="dl">${r.dim}</div>
      <div class="dv" style="color:${active==='left'?'var(--primary)':'var(--accent)'}">${r.letter} | ${r.score}/${r.total}</div>
      <div class="dd">${active==='left'?r.left:r.right}</div>
    </div>`;
  }).join('');
  // 保存记录
  saveRecord(type, results);
}

function saveRecord(type, results) {
  const records = JSON.parse(localStorage.getItem('mbti-records')||'[]');
  const r = results.reduce((a,b)=>(a[b.dim]=b.letter,a),{});
  records.unshift({type, name:TYPE_NAMES[type]||'',mode,
    ei:r['E/I'],sn:r['S/N'],tf:r['T/F'],jp:r['J/P'],
    time:new Date().toLocaleString()});
  if(records.length>50) records.length=50;
  localStorage.setItem('mbti-records',JSON.stringify(records));
  renderHistory();
}

function renderHistory() {
  const records = JSON.parse(localStorage.getItem('mbti-records')||'[]');
  document.getElementById('historyList').innerHTML = records.length?records.map(r=>
    `<div class="record-item"><div><span class="rtype">${r.type}</span><span class="rname">${r.name}</span></div><span class="rtime">${r.time}</span></div>`
  ).join('') : '<p style="color:#aaa;font-size:13px;text-align:center;padding:12px 0">暂无测试记录</p>';
}

function startTest(m) {
  mode = m;
  questions = m==='quick'?QUICK_INDICES.map(i=>ALL_QUESTIONS[i]):ALL_QUESTIONS;
  current=0;
  answers=new Array(questions.length).fill(null);
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('questionPage').classList.add('active');
  render();
}

function goHome() {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('welcomePage').classList.add('active');
}

function shareResult() {
  const t = document.getElementById('resultBadge').textContent;
  const n = document.getElementById('resultName').textContent;
  const text = `我刚做了MBTI人格测试，结果是 ${t} ${n} 🔮\n来测测你的性格类型吧！`;
  if(navigator.share){
    navigator.share({title:'MBTI测试结果',text}).catch(()=>{});
  } else {
    navigator.clipboard.writeText(text).then(()=>alert('已复制到剪贴板，分享给朋友吧！'));
  }
}

// 初始化
renderHistory();
</script>
